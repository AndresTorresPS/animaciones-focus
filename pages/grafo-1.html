<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafo Vivo y Dinámico</title>
    <link rel="stylesheet" href="grafo-1.css">
</head>
<body>

<a href="../index.html" class="nav-btn">← Volver</a>

<div class="camera-view">
  <div class="dynamic-grid"></div>
  <div class="grid-overlay"></div>

  <div class="graph-container">
    <div class="edge-container">
      <div id="loop-0" class="edge">
        <div id="dot-loop-0" class="edge-dot loop"></div>
      </div>

      <svg id="edge-6-3" class="edge" viewBox="0 0 250 350">
        <path d="M 0 0 C 100 50, 150 200, 210 330" />
        <div id="dot-6-3" class="edge-dot"></div>
      </svg>
      <div id="head-6-3" class="arrowhead"></div>

      <svg id="edge-1-4" class="edge" viewBox="0 0 250 350">
        <path d="M 0 0 C -100 50, -150 200, -210 330" />
        <div id="dot-1-4" class="edge-dot"></div>
      </svg>
      <div id="head-1-4" class="arrowhead"></div>

      <svg id="edge-5-2" class="edge" viewBox="0 0 350 100">
        <path d="M 0 0 C 100 100, 250 100, 350 0" />
        <div id="dot-5-2" class="edge-dot"></div>
      </svg>
      <div id="head-5-2" class="arrowhead"></div>

      <svg id="edge-5-4" class="edge" viewBox="0 0 80 180">
        <path d="M 0 0 C -20 100, 50 150, 80 150" />
        <div id="dot-5-4" class="edge-dot"></div>
      </svg>
      <div id="head-5-4" class="arrowhead"></div>

      <svg id="edge-2-3" class="edge" viewBox="0 0 80 180">
        <path d="M 0 0 C -20 100, 50 150, 80 150" />
        <div id="dot-2-3" class="edge-dot"></div>
      </svg>
      <div id="head-2-3" class="arrowhead"></div>

    </div>

    <div id="node-0" class="node"><span class="node-label">0</span></div>
    <div id="node-1" class="node"><span class="node-label">1</span></div>
    <div id="node-2" class="node"><span class="node-label">2</span></div>
    <div id="node-3" class="node"><span class="node-label">3</span></div>
    <div id="node-4" class="node"><span class="node-label">4</span></div>
    <div id="node-5" class="node"><span class="node-label">5</span></div>
    <div id="node-6" class="node"><span class="node-label">6</span></div>
  </div>
</div>

</body>
</html>
