<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafo de divisibilidad del 9</title>
    <link rel="stylesheet" href="graph-2.css">
</head>
<body>

<a href="../index.html" class="nav-btn">← Volver</a>

<div class="info-panel">
    <h2>Divisibilidad del 9</h2>
    <p>Divisores: <strong>1, 3, 9</strong></p>
    <p>Haz hover sobre los nodos para ver las relaciones de divisibilidad</p>
</div>

<div class="camera-view">
  <div class="dynamic-grid"></div>
  <div class="grid-overlay"></div>

  <div class="graph-container">
    <div class="edge-container"></div>

    <!-- Nodos del grafo de divisibilidad del 9 -->
    <div id="node-1" class="node node-divisor" data-value="1">
      <span class="node-label">1</span>
      <div class="node-info">Divisor universal</div>
    </div>
    
    <div id="node-3" class="node node-divisor" data-value="3">
      <span class="node-label">3</span>
      <div class="node-info">Divisor del 9</div>
    </div>
    
    <div id="node-9" class="node node-dividend" data-value="9">
      <span class="node-label">9</span>
      <div class="node-info">Número base</div>
    </div>

    <!-- Relaciones de divisibilidad -->
    <div class="relation-label" id="rel-1-3" style="opacity: 0;">1 | 3</div>
    <div class="relation-label" id="rel-1-9" style="opacity: 0;">1 | 9</div>
    <div class="relation-label" id="rel-3-9" style="opacity: 0;">3 | 9</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="../assets/js/graph.js"></script>
<script src="graph-2.js"></script>
</body>
</html>
